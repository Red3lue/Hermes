      <path d="M100 100 C 110 86, 124 76, 140 70" transform="matrix(-1 0 0 1 200 0)"/>
      <path d="M100 100 C 116 84, 138 70, 162 60" transform="matrix(-1 0 0 1 200 0)"/>
      <path d="M100 100 C 122 80, 152 64, 184 50" transform="matrix(-1 0 0 1 200 0)"/>
      <path d="M100 100 C 118 92, 142 92, 168 92" transform="matrix(-1 0 0 1 200 0)"/>
      <path d="M100 100 C 116 110, 142 116, 172 116" transform="matrix(-1 0 0 1 200 0)"/>
      <path d="M100 100 C 112 120, 130 138, 152 152" transform="matrix(-1 0 0 1 200 0)"/>
    </g>
  </g>

  <g fill="none" stroke="url(#wing-grad)" stroke-width="1.6" stroke-linecap="round">
    <path d="M100 40 L100 160"/>
    <path d="M100 100 C 110 86, 124 76, 140 70"/>
    <path d="M100 100 C 116 84, 138 70, 162 60"/>
    <path d="M100 100 C 122 80, 152 64, 184 50"/>
    <path d="M100 100 C 118 92, 142 92, 168 92"/>
    <path d="M100 100 C 116 110, 142 116, 172 116"/>
    <path d="M100 100 C 112 120, 130 138, 152 152"/>
    <path d="M100 100 C 110 86, 124 76, 140 70" transform="matrix(-1 0 0 1 200 0)"/>
    <path d="M100 100 C 116 84, 138 70, 162 60" transform="matrix(-1 0 0 1 200 0)"/>
    <path d="M100 100 C 122 80, 152 64, 184 50" transform="matrix(-1 0 0 1 200 0)"/>
    <path d="M100 100 C 118 92, 142 92, 168 92" transform="matrix(-1 0 0 1 200 0)"/>
    <path d="M100 100 C 116 110, 142 116, 172 116" transform="matrix(-1 0 0 1 200 0)"/>
    <path d="M100 100 C 112 120, 130 138, 152 152" transform="matrix(-1 0 0 1 200 0)"/>
