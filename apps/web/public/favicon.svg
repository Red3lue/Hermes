<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="wing-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5cd9ff"/>
      <stop offset="55%" stop-color="#2cc7ff"/>
      <stop offset="100%" stop-color="#c454ff"/>
    </linearGradient>
    <radialGradient id="wing-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(44,199,255,0.55)"/>
      <stop offset="60%" stop-color="rgba(44,199,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="wing-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <rect width="200" height="200" rx="36" fill="#05070f"/>
  <circle cx="100" cy="100" r="92" fill="url(#wing-glow)"/>

  <g filter="url(#wing-blur)" opacity="0.75">
